  - time.*.com
  - time.*.apple.com
  - +.pool.ntp.org
  - +.ir
  - +.aparat.com
  - +.digikala.com
  - +.snapp.ir
  - +.tapsi.ir
  - +.divar.ir
  - '*.local'
