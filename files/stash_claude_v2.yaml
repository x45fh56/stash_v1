    +.twitter.com: https://dns.google/dns-query
    +.x.com: https://dns.google/dns-query
    +.openai.com: https://dns.google/dns-query
  fake-ip-filter:
  - +.stun.*.*
  - +.stun.*.*.*
  - +.stun.*.*.*.*
  - lens.l.google.com
  - stun.l.google.com
  - '*.n.n.srv.nintendo.net'
  - +.stun.playstation.net
  - xbox.*.*.microsoft.com
  - '*.*.xboxlive.com'
  - '*.msftncsi.com'
  - '*.msftconnecttest.com'
  - msftconnecttest.com
  - time.*.com
  - time.*.apple.com
  - +.pool.ntp.org
  - +.ir
  - +.aparat.com
  - +.digikala.com
  - +.snapp.ir
  - +.tapsi.ir
  - +.divar.ir
  - '*.local'
  - '*.localhost'
  - '*.lan'
  - '*.home.arpa'
  - localhost
script:
  shortcuts:
    quic: network == 'udp' and dst_port == 443
