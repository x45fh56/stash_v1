  - '*.*.xboxlive.com'
  - '*.msftncsi.com'
  - '*.msftconnecttest.com'
  - msftconnecttest.com
  - time.*.com
  - time.*.apple.com
  - +.pool.ntp.org
  - +.ir
  - +.aparat.com
  - +.digikala.com
  - +.snapp.ir
  - +.tapsi.ir
  - +.divar.ir
  - '*.local'
  - '*.localhost'
  - '*.lan'
  - '*.home.arpa'
