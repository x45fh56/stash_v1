mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
global-client-fingerprint: chrome
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  default-nameserver:
  - 1.1.1.1
  - 8.8.8.8
  - 119.29.29.29
