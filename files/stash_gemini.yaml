mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
global-client-fingerprint: chrome
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  default-nameserver:
  - 1.1.1.1
  - 8.8.8.8
  - 119.29.29.29
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-hosts: true
  nameserver:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
  - https://doh.pub/dns-query
  fallback:
  - https://1.0.0.1/dns-query
  - https://public.dns.iij.jp/dns-query
  - tcp://8.8.8.8
  fallback-filter:
    geoip: true
    ipcidr:
    - 240.0.0.0/4
  fake-ip-filter:
  - +.ir
  - +.gov.ir
  - '*.ir'
  - '*.snapp.ir'
  - '*.tapsi.ir'
  - '*.rubika.ir'
  - '*.igap.net'
  - '*.eitaa.com'
  - '*.shad.ir'
  - '*.shaparak.ir'
  - '*.bank*'
  - '*.bmi.ir'
  - '*.sep.ir'
rule-providers:
  Iran_Domains:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Chocolate4U/Iran-sing-box-rules@rule-set/clash/iran.yaml
    path: ./rules/iran_domains.yaml
    interval: 86400
  Iran_IP:
    type: http
    behavior: ipcidr
    url: https://cdn.jsdelivr.net/gh/Chocolate4U/Iran-sing-box-rules@rule-set/clash/iran_ip.yaml
    path: ./rules/iran_ip.yaml
    interval: 86400
  Ads:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/privacy-protection-tools/anti-AD@master/anti-ad-clash.yaml
    path: ./rules/ads.yaml
    interval: 86400
