mode: rule
log-level: info
dns:
  default-nameserver:
  - 178.22.122.100
  - 8.8.8.8
  nameserver:
  - https://dns.shecan.ir/dns-query
  - https://doh.403.online/dns-query
  - https://dns.google/dns-query
  nameserver-policy:
    +.ir: 178.22.122.100
