    +.github.com: https://dns.google/dns-query
    +.twitter.com: https://dns.google/dns-query
    +.x.com: https://dns.google/dns-query
  fake-ip-filter:
  - +.stun.*.*
  - +.stun.*.*.*
  - +.stun.*.*.*.*
  - lens.l.google.com
  - '*.n.n.srv.nintendo.net'
  - +.stun.playstation.net
  - xbox.*.*.microsoft.com
  - '*.*.xboxlive.com'
  - '*.msftncsi.com'
  - '*.msftconnecttest.com'
  - +.ir
  - +.aparat.com
  - +.digikala.com
  - +.snapp.ir
  - +.tapsi.ir
  - +.divar.ir
  - '*.local'
  - '*.localhost'
  - '*.lan'
  - '*.home.arpa'
  - localhost
