  - xbox.*.*.microsoft.com
  - '*.*.xboxlive.com'
  - '*.msftncsi.com'
  - '*.msftconnecttest.com'
  - +.ir
  - +.aparat.com
  - +.digikala.com
  - +.snapp.ir
  - +.tapsi.ir
  - +.divar.ir
  - '*.local'
  - '*.localhost'
  - '*.lan'
  - '*.home.arpa'
  - localhost
