    interval: 86400
  iran-direct:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/direct.txt
    interval: 86400
  iran-cidr:
    behavior: ipcidr
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/ircidr.txt
    interval: 86400
  ads:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/ads.txt
    interval: 86400
  telegram-cidr:
    behavior: ipcidr
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/telegram.txt
    interval: 86400
rules:
- SCRIPT,quic,REJECT,no-track
- RULE-SET,ads,🚫 Ad Block
