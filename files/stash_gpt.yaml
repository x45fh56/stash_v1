- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - BrilliantGift
  - ConfigX2ray
  - ConfiingPro
  - FreakConfig
  - NetShot1
  - ParsiNetFree
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - pythash
  - tv2rayrr
