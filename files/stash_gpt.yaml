ipv6: false
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: redir-host
  default-nameserver:
  - 1.1.1.1
  - 8.8.8.8
  nameserver:
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query
  fallback:
  - tls://8.8.4.4:853
  - tls://1.0.0.1:853
  fallback-filter:
    geoip: true
    geoip-code: IR
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
