mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: redir-host
  default-nameserver:
  - 1.1.1.1
  - 8.8.8.8
  nameserver:
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query
  fallback:
  - tls://8.8.4.4:853
  - tls://1.0.0.1:853
  fallback-filter:
    geoip: true
    geoip-code: IR
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
proxies:
- name: FreakConfig
  type: vless
  server: 199.241.32.132
  port: 26978
  uuid: 9042affd-0ad3-4014-adbc-e52f00891ea2
  network: tcp
  udp: true
  tls: true
  servername: tesla.com
  client-fingerprint: chrome
  flow: xtls-rprx-vision
  skip-cert-verify: true
  benchmark-url: http://www.gstatic.com/generate_204
  benchmark-timeout: 6
  reality-opts:
    public-key: n2w4hj7Q7wN6P21LSJJwIPitfYZbwWh5a2seJHH58SE
    short-id: 28bf
proxy-groups:
- name: AUTO-IRAN
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 120
  tolerance: 100
  proxies:
  - FreakConfig
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - FreakConfig
  - DIRECT
rule-providers:
  ir:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/ir.txt
    interval: 86400
  direct:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/direct.txt
    interval: 86400
rules:
- RULE-SET,ir,DIRECT
- RULE-SET,direct,DIRECT
- GEOIP,IR,DIRECT,no-resolve
- MATCH,SELECT
