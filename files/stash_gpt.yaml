- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - FreakConfig
  - configraygan
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
  - tv2rayrr
