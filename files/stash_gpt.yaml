  - https://dns.google/dns-query
  fallback:
  - tls://8.8.4.4:853
  - tls://1.0.0.1:853
  fallback-filter:
    geoip: true
    geoip-code: IR
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
