  tolerance: 100
  proxies:
  - BrilliantGift
  - ConfigX2ray
  - ConfiingPro
  - FreakConfig
  - NetShot1
  - ParsiNetFree
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - pythash
  - tv2rayrr
  - v2to_nadi
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - BrilliantGift
  - ConfigX2ray
  - ConfiingPro
  - FreakConfig
  - NetShot1
  - ParsiNetFree
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - pythash
  - tv2rayrr
  - v2to_nadi
  - DIRECT
rule-providers:
  ir:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/ir.txt
    interval: 86400
  direct:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/direct.txt
    interval: 86400
rules:
- RULE-SET,ir,DIRECT
- RULE-SET,direct,DIRECT
- GEOIP,IR,DIRECT,no-resolve
- MATCH,SELECT
