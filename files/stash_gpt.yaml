  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - tv2rayrr
  - v2ray_extractor
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - FreakConfig
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - tv2rayrr
  - v2ray_extractor
