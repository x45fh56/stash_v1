  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - ConfigX2ray
  - FreakConfig
  - Maznet
  - NetAccount
  - NetShot1
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
