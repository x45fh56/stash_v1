- name: AUTO-IRAN
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 120
  tolerance: 100
  proxies:
  - BrilliantGift
  - FreakConfig
  - Maznet
  - NetShot1
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - BrilliantGift
  - FreakConfig
  - Maznet
  - NetShot1
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
