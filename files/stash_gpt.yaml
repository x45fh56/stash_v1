- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - FreakConfig
  - Maznet
  - NetAccount
  - NetShot1
  - TheVPNMethod
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
