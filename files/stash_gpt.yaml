  - persianvpnhub
  - tv2rayrr
  - v2ray_extractor
  - wiki_tajrobe
  - xsfilternet
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - FreakConfig
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
  - tv2rayrr
  - v2ray_extractor
  - wiki_tajrobe
  - xsfilternet
