  tolerance: 100
  proxies:
  - FreakConfig
  - configraygan
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
  - wiki_tajrobe
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - FreakConfig
  - configraygan
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
  - wiki_tajrobe
