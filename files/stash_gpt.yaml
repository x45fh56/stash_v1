- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - FreakConfig
  - Maznet
  - NetAccount
  - NetShot1
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
