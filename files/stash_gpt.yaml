  - persianvpnhub
  - pythash
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - ConfigX2ray
  - FreakConfig
  - Maznet
  - NetShot1
  - ParsiNetFree
  - SparrK_VPN
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
  - pythash
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
  - DIRECT
rule-providers:
  ir:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/ir.txt
    interval: 86400
  direct:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/direct.txt
    interval: 86400
rules:
- RULE-SET,ir,DIRECT
- RULE-SET,direct,DIRECT
- GEOIP,IR,DIRECT,no-resolve
- MATCH,SELECT
