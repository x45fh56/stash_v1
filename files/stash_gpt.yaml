  - persianvpnhub
  - pythash
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - ConfigX2ray
  - FreakConfig
  - Maznet
  - NetShot1
  - ParsiNetFree
  - TheVPNMethod
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
  - pythash
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
