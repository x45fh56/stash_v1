  - persianvpnhub
  - tv2rayrr
  - vpnbaz
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - ConfigX2ray
  - FreakConfig
  - Maznet
  - NetShot1
  - SparrK_VPN
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
  - tv2rayrr
  - vpnbaz
