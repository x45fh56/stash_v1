  - tv2rayrr
  - vpnbaz
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - FreakConfig
  - Maznet
  - NetShot1
  - SparrK_VPN
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - tv2rayrr
  - vpnbaz
