proxy-groups:
- name: AUTO-IRAN
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 120
  tolerance: 100
  proxies:
  - FreakConfig
  - Maznet
  - NetShot1
  - TheVPNMethod
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - FreakConfig
  - Maznet
  - NetShot1
  - TheVPNMethod
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
  - DIRECT
rule-providers:
  ir:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/ir.txt
    interval: 86400
  direct:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/direct.txt
    interval: 86400
rules:
- RULE-SET,ir,DIRECT
- RULE-SET,direct,DIRECT
- GEOIP,IR,DIRECT,no-resolve
- MATCH,SELECT
