- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - ConfigX2ray
  - ConfiingPro
  - ParsiNetFree
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - pythash
