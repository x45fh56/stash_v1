proxy-groups:
- name: AUTO-IRAN
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 120
  tolerance: 100
  proxies:
  - ConfigX2ray
  - FreakConfig
  - Maznet
  - NetAccount
  - NetShot1
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
  - pythash
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - ConfigX2ray
  - FreakConfig
  - Maznet
  - NetAccount
  - NetShot1
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
  - persianvpnhub
  - pythash
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
