- name: AUTO-IRAN
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 120
  tolerance: 100
  proxies:
  - ConfigX2ray
  - FreakConfig
  - Maznet
  - NetShot1
  - ParsiNetFree
  - SparrK_VPN
  - dingyue_center
