- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - BrilliantGift
  - ConfigX2ray
  - FreakConfig
  - NetAccount
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
