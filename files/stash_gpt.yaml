    interval: 86400
  direct:
    behavior: domain
    format: text
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/direct.txt
    interval: 86400
rules:
- RULE-SET,ir,DIRECT
- RULE-SET,direct,DIRECT
- GEOIP,IR,DIRECT,no-resolve
- MATCH,SELECT
