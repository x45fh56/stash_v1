  - persianvpnhub
  - pythash
  - tv2rayrr
  - v2ray_extractor
  - vpnbaz
- name: SELECT
  type: select
  proxies:
  - AUTO-IRAN
  - ConfigX2ray
  - FreakConfig
  - NetShot1
  - ParsiNetFree
  - dingyue_center
  - new_mtproxi2
  - oneclickvpnkeys
