ipv6: false
external-controller: 0.0.0.0:9090
global-client-fingerprint: chrome
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  default-nameserver:
  - 1.1.1.1
  - 8.8.8.8
  - 119.29.29.29
