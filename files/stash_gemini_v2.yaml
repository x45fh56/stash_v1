  - +.ir
  - +.gov.ir
  - '*.ir'
  - '*.snapp.ir'
  - '*.tapsi.ir'
  - '*.rubika.ir'
  - '*.igap.net'
  - '*.eitaa.com'
  - '*.shad.ir'
  - '*.shaparak.ir'
  - '*.bank*'
  - '*.bmi.ir'
  - '*.sep.ir'
  - '*.lan'
  - '*.local'
